<!DOCTYPE html>
<html lang="ta">
<head>
  <script>
    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.classList.add("dark");
    }
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Campaigns</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/campaigns.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <div class="top-title">
      <h1>Campaigns</h1>
      <p>Image, date, place, description, see more</p>
    </div>
  </header>

  <section class="hero">
    <div>
      <span class="pill">Campaign Hub</span>
      <h2>Latest campaign activities and updates</h2>
      <p>Browse active campaigns with detailed cards, image previews, and full popup information.</p>
    </div>
  </section>

  <section class="grid" id="campaignGrid"></section>

  <dialog id="campaignDialog" class="campaign-dialog">
    <div class="dialog-head">
      <div>
        <span class="dialog-tag" id="dlgType">Campaign</span>
        <h3 id="dlgTitle">Title</h3>
        <p id="dlgMeta">Date • Place</p>
      </div>
      <button class="close-btn" id="closeDialog" type="button"><i class="fas fa-times"></i></button>
    </div>

    <div class="dialog-image-wrap">
      <img id="dlgImage" src="" alt="Campaign image">
    </div>

    <div class="dialog-content">
      <p id="dlgDescription"></p>

      <div class="detail-row">
        <div class="detail-box">
          <span>Date</span>
          <strong id="dlgDate"></strong>
        </div>
        <div class="detail-box">
          <span>Place</span>
          <strong id="dlgPlace"></strong>
        </div>
      </div>

      <div class="detail-list">
        <h4>Highlights</h4>
        <ul id="dlgHighlights"></ul>
      </div>
    </div>
  </dialog>

  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/campaigns.js"></script>
</body>
</html>
