<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Events - Youth Connect Tamil Nadu</title>
<link rel="stylesheet" href="css/main.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
<div class="page-header">
  <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
  <h1>Upcoming Events</h1>
</div>

<section class="section">
  <div class="card-grid">
    <div class="event-card">
      <img src="assets/event1.jpg" alt="Event 1">
      <div class="card-content">
        <span class="badge">EVENT</span>
        <h3>State Youth Conference</h3>
        <p>Chennai • 15 Aug 2026</p>
      </div>
    </div>
    <div class="event-card">
      <img src="assets/event2.jpg" alt="Event 2">
      <div class="card-content">
        <span class="badge">MEETING</span>
        <h3>District Committee Meeting</h3>
        <p>Madurai • 20 Aug 2026</p>
      </div>
    </div>
    <div class="event-card">
      <img src="assets/event3.jpg" alt="Event 3">
      <div class="card-content">
        <span class="badge">PROGRAM</span>
        <h3>Volunteer Training</h3>
        <p>Coimbatore • 24 Aug 2026</p>
      </div>
    </div>
  </div>

<script type="module" src="js/app.js"></script>

</html>
