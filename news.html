<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>News - Youth Connect Tamil Nadu</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
</head>
<body>

<div class="page-header">
  <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
  <h1>Latest News</h1>
  <button class="page-icon-btn" id="openPostBtn"><i class="fas fa-plus"></i></button>
</div>

<section class="news-hero">
  <div class="news-hero-content">
    <span class="hero-tag">Live</span>
    <h2>Youth Connect News Feed</h2>
    <p>Realtime updates, campaigns, events and community news.</p>
  </div>
</section>

<section class="news-tools">
  <div class="search-box">
    <i class="fas fa-search"></i>
    <input type="text" id="newsSearch" placeholder="Search news...">
  </div>
</section>

<section class="news-section" id="newsList"></section>

<button id="loadMoreBtn" class="load-more-btn">Load More</button>

<dialog id="postDialog" class="post-dialog">
  <form id="postForm" class="post-form">
    <div class="dialog-head">
      <h3>Post News</h3>
      <button type="button" id="closePostBtn" class="popup-close"><i class="fas fa-times"></i></button>
    </div>

    <input type="text" id="postTitle" placeholder="News title" required>
    <textarea id="postDescription" placeholder="News description" rows="4" required></textarea>
    <input type="text" id="postCategory" placeholder="Category: breaking / events / campaigns" required>
    <input type="file" id="postImage" accept="image/*">

    <div class="form-actions">
      <button type="button" id="cancelPostBtn" class="ghost-btn">Cancel</button>
      <button type="submit" class="read-more-btn">Upload</button>
    </div>
  </form>
</dialog>

<footer>
  <p class="copyright">© 2026 Youth Connect. All Rights Reserved.</p>
</footer>

<script type="module" src="js/news-firebase.js"></script>
</body>
</html>
