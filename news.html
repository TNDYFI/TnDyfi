<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>News</title>
<link rel="stylesheet" href="news.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

<header class="topbar">
  <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
  <div class="top-title">
    <h1>News Feed</h1>
    <p>Instagram style updates</p>
  </div>
</header>

<section class="story-strip">
  <div class="story-chip active">All</div>
  <div class="story-chip">Breaking</div>
  <div class="story-chip">Events</div>
  <div class="story-chip">Campaigns</div>
  <div class="story-chip">District</div>
</section>

<section class="feed" id="newsFeed"></section>

<dialog id="shareDialog" class="share-dialog">
  <div class="dialog-inner">
    <div class="dialog-head">
      <h3>Share Post</h3>
      <button class="close-x" id="closeShare"><i class="fas fa-times"></i></button>
    </div>
    <div class="share-grid">
      <button class="share-item"><i class="fab fa-whatsapp"></i><span>WhatsApp</span></button>
      <button class="share-item"><i class="fab fa-facebook"></i><span>Facebook</span></button>
      <button class="share-item"><i class="fab fa-x-twitter"></i><span>X</span></button>
      <button class="share-item"><i class="fas fa-link"></i><span>Copy Link</span></button>
    </div>
  </div>
</dialog>

<script type="module" src="news.js"></script>
</body>
</html>
