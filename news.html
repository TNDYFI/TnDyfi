<article class="news-card">
  <div class="news-media">
    <img src="assets/news1.jpg" alt="News">
    <div class="top-badge">
      <span class="badge-pill">BREAKING</span>
      <span class="badge-pill">#youthconnect</span>
    </div>
    <button class="news-save"><i class="far fa-bookmark"></i></button>
  </div>

  <div class="news-body">
    <div class="news-head">
      <h3 class="news-title">State Youth Conference Announced</h3>
      <span class="news-date">20 Jul 2026</span>
    </div>

    <div class="news-meta">
      <span class="hashtag">#education</span>
      <span class="hashtag">#volunteer</span>
      <span class="hashtag">#tamilnadu</span>
    </div>

    <p class="news-desc">
      Youth Connect is preparing a statewide initiative focused on leadership, education and community service.
    </p>

    <div class="news-author-row">
      <img src="assets/profile.jpg" class="author-avatar" alt="Author">
      <div class="author-info">
        <span class="author-name">Youth Connect Team</span>
        <span class="author-role">Official News Publisher</span>
      </div>
    </div>

    <div class="action-row">
      <div class="action-group">
        <button class="action-btn like"><i class="fas fa-heart"></i> Like <span>0</span></button>
        <button class="action-btn comment"><i class="fas fa-comment"></i> Comment</button>
        <button class="action-btn share"><i class="fas fa-share-nodes"></i> Share</button>
      </div>
      <button class="action-btn save"><i class="far fa-bookmark"></i></button>
    </div>

    <div class="comment-panel">
      <div class="comment-list">
        <div class="comment-item">
          <strong>Arun</strong>
          <p>Super update!</p>
        </div>
      </div>

      <div class="reply-row">
        <input type="text" placeholder="Write a comment...">
        <button>Reply</button>
      </div>
    </div>
  </div>
</article>
