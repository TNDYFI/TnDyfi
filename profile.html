<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - Youth Connect</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<header>
<button onclick="history.back()">
<i class="fas fa-arrow-left"></i>
</button>

<div class="logo">
<img src="assets/logo.png">
<span>Profile</span>
</div>

<div></div>
</header>

<section class="section" style="margin-top:80px;">

<div class="profile glass text-center">

<img src="assets/logo.png">

<h2>Youth Member</h2>

<p>Tamil Nadu</p>

</div>

<br>

<div class="news-card">

<div class="news-content">

<h3><i class="fas fa-user"></i> Name</h3>

<p id="userName">Guest User</p>

<hr><br>

<h3><i class="fas fa-envelope"></i> Email</h3>

<p id="userEmail">Not Available</p>

<hr><br>

<h3><i class="fas fa-phone"></i> Mobile</h3>

<p id="userPhone">Not Available</p>

<hr><br>

<button class="read-btn" onclick="logout()">
Logout
</button>

</div>

</div>

</section>

<script type="module">

import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

import { app } from "./js/firebase.js";

const auth = getAuth(app);

auth.onAuthStateChanged(user=>{

if(user){

document.getElementById("userName").innerHTML=user.displayName || "Youth Member";

document.getElementById("userEmail").innerHTML=user.email;

}

});

window.logout=function(){

signOut(auth).then(()=>{

location.href="index.html";

});

}

</script>

</body>
</html>
